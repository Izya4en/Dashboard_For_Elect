version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3 # Используем PostGIS "на вырост" для тепловых карт
    container_name: techdash-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: techdash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Подкидываем скрипт, чтобы таблица создалась сама при первом запуске
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 

volumes:
  pgdata: